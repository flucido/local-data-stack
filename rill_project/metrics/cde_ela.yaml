# CDE Academic Indicator — English Language Arts
# Source: CDE Dashboard download file (eladownloadYYYY.txt) via dbt rill_cde_ela
# Grades 3-8 + 11. Status = avg Distance from Standard (negative = below standard).
# Color: Red(1)→Blue(5). Higher DFS = better.

type: metrics_view
title: "Academic — ELA (CDE Dashboard)"
model: cde_ela

dimensions:
  - name: cds_code
    label: "CDS Code"
    column: cds_code
    description: "14-character County-District-School code"

  - name: school_name
    label: "School Name"
    column: school_name

  - name: district_name
    label: "District Name"
    column: district_name

  - name: county_name
    label: "County"
    column: county_name

  - name: aggregate_level
    label: "Aggregate Level"
    column: aggregate_level
    description: "School or District"

  - name: academic_year
    label: "Academic Year"
    column: academic_year
    description: "Reporting year (e.g. 2025)"

  - name: student_group
    label: "Student Group"
    column: student_group
    description: "All Students, race/ethnicity, program subgroup, or ELA-specific (CAA, EO, ELO, RFP, SBA)"

  - name: student_group_type
    label: "Student Group Type"
    column: student_group_type

  - name: performance_color
    label: "Performance Color"
    column: performance_color
    description: "Red, Orange, Yellow, Green, Blue, or No Performance Color"

  - name: status_level
    label: "Status Level"
    column: status_level

  - name: change_level
    label: "Change Level"
    column: change_level

  - name: is_charter
    label: "Charter School"
    column: is_charter

  - name: is_dass
    label: "DASS School"
    column: is_dass

measures:
  - name: status_value
    label: "Distance from Standard"
    expression: AVG(status_value)
    format_preset: humanize
    description: "Average DFS (negative = below standard, positive = above)"

  - name: status_value_without_prloss
    label: "DFS (no PR loss adjustment)"
    expression: AVG(status_value_without_prloss)
    format_preset: humanize

  - name: prior_status_value
    label: "Prior Year DFS"
    expression: AVG(prior_status_value)
    format_preset: humanize

  - name: change_value
    label: "Change (DFS pts)"
    expression: AVG(change_value)
    format_preset: humanize
    description: "Year-over-year change in Distance from Standard (positive = improved)"

  - name: curr_denominator
    label: "Tested Students (n)"
    expression: SUM(curr_denominator)
    format_preset: humanize
    description: "Continuously enrolled tested students (denominator)"

  - name: curr_participation_rate
    label: "Participation Rate (%)"
    expression: AVG(curr_participation_rate)
    format_preset: humanize
    description: "Federal 95% participation rate target"

  - name: school_count
    label: "Schools / Entities"
    expression: COUNT(DISTINCT cds_code)
    format_preset: humanize

  - name: red_count
    label: "Red Performance Count"
    expression: SUM(CASE WHEN performance_color = 'Red' THEN 1 ELSE 0 END)
    format_preset: humanize

  - name: orange_count
    label: "Orange Performance Count"
    expression: SUM(CASE WHEN performance_color = 'Orange' THEN 1 ELSE 0 END)
    format_preset: humanize

  - name: yellow_count
    label: "Yellow Performance Count"
    expression: SUM(CASE WHEN performance_color = 'Yellow' THEN 1 ELSE 0 END)
    format_preset: humanize

  - name: green_count
    label: "Green Performance Count"
    expression: SUM(CASE WHEN performance_color = 'Green' THEN 1 ELSE 0 END)
    format_preset: humanize

  - name: blue_count
    label: "Blue Performance Count"
    expression: SUM(CASE WHEN performance_color = 'Blue' THEN 1 ELSE 0 END)
    format_preset: humanize
