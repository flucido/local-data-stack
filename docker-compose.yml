# Local Data Stack - Docker Compose
# 100% local development environment with Rill

version: '3.8'

services:
  # Rill Developer - BI dashboards and analytics
  rill:
    image: rilldata/rill:latest
    container_name: local-data-stack-rill
    ports:
      - "9009:9009"
    volumes:
      - ./:/app
      - ./oss_framework/data:/data
    environment:
      - RILL_RUNTIME_LOG_LEVEL=info
      - DUCKDB_DATABASE_PATH=/data/oea.duckdb
    command: rill start --project /app/rill_project
    restart: unless-stopped
    networks:
      - local-data-stack

networks:
  local-data-stack:
    driver: bridge

volumes:
  data:
    driver: local
