name: Test & Lint

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'oss_framework/**'
      - 'rill_project/**'
      - 'scripts/**'
      - 'schema/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - 'CODE_OF_CONDUCT.md'
      - '.env.example'
      - '.gitignore'
      - 'docker-compose.yml'
      - 'pyproject.toml'
      - 'requirements.txt'
      - 'uv.lock'
      - '.github/workflows/test.yml'
      - '.github/scripts/**'
      - '.github/CODEOWNERS'
      - '.github/WORKFLOWS.md'
      - '.github/rulesets/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'oss_framework/**'
      - 'rill_project/**'
      - 'scripts/**'
      - 'schema/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - 'CODE_OF_CONDUCT.md'
      - '.env.example'
      - '.gitignore'
      - 'docker-compose.yml'
      - 'pyproject.toml'
      - 'requirements.txt'
      - 'uv.lock'
      - '.github/workflows/test.yml'
      - '.github/scripts/**'
      - '.github/CODEOWNERS'
      - '.github/WORKFLOWS.md'
      - '.github/rulesets/**'

jobs:
  contract-tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install contract test dependency
      run: |
        python -m pip install --upgrade pip
        pip install duckdb

    - name: Run dashboard contract tests
      env:
        DUCKDB_DATABASE_PATH: oss_framework/data/oea.duckdb
      run: |
        python scripts/contracts/contract_tests.py

  test:
    runs-on: ubuntu-latest
    needs: contract-tests
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install pytest-asyncio

    - name: Lint with ruff
      run: |
        ruff check oss_framework --output-format=github

    - name: Format check with black
      run: |
        black --check oss_framework

    - name: Test with pytest
      run: |
        pytest oss_framework/tests/ -v --cov=oss_framework --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
        verbose: true

    - name: Archive coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: coverage.xml
