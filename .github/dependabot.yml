# Dependabot configuration for local-data-stack
# Weekly scans of Python (uv) dependencies. Dev/test deps are grouped separately
# so production security alerts surface distinctly from tooling churn.
version: 2

updates:
  # Production dependencies (pyproject.toml [project.dependencies])
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      production-deps:
        patterns:
          - "duckdb"
          - "dbt*"
          - "dlt"
          - "pandas"
          - "pyarrow"
          - "numpy"
          - "openpyxl"
          - "deltalake"
          - "sqlalchemy"
          - "psycopg2*"
          - "flask"
          - "fastapi"
          - "python-dotenv"
          - "pydantic"
          - "requests"
          - "urllib3"
          - "tqdm"
          - "cryptography"
          - "passlib"
    labels:
      - "dependencies"
      - "security"

  # Development dependencies (pyproject.toml [project.optional-dependencies])
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      dev-deps:
        patterns:
          - "pytest*"
          - "black"
          - "ruff"
          - "mypy"
          - "pre-commit"
      jupyter-deps:
        patterns:
          - "jupyter*"
          - "ipywidgets"
          - "nbconvert"
          - "bleach"
    labels:
      - "dependencies"
      - "dev-tooling"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
